<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="80" ry="80" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect x="4" y="4" width="504" height="504" rx="76" ry="76" fill="none" stroke="#e89f41" stroke-opacity="0.15" stroke-width="4"/>

  <!-- 4x6 Step Grid -->
  <!-- Row 1 (top) -->
  <rect x="80"  y="72" width="56" height="48" rx="6" fill="#e89f41"/>
  <rect x="152" y="72" width="56" height="48" rx="6" fill="#e89f41" opacity="0.7"/>
  <rect x="224" y="72" width="56" height="48" rx="6" fill="#222"/>
  <rect x="296" y="72" width="56" height="48" rx="6" fill="#e89f41" opacity="0.5"/>
  <rect x="368" y="72" width="56" height="48" rx="6" fill="#222"/>

  <!-- Row 2 -->
  <rect x="80"  y="136" width="56" height="48" rx="6" fill="#222"/>
  <rect x="152" y="136" width="56" height="48" rx="6" fill="#e89f41" opacity="0.9"/>
  <rect x="224" y="136" width="56" height="48" rx="6" fill="#e89f41"/>
  <rect x="296" y="136" width="56" height="48" rx="6" fill="#222"/>
  <rect x="368" y="136" width="56" height="48" rx="6" fill="#e89f41" opacity="0.4"/>

  <!-- Row 3 -->
  <rect x="80"  y="200" width="56" height="48" rx="6" fill="#e89f41" opacity="0.6"/>
  <rect x="152" y="200" width="56" height="48" rx="6" fill="#222"/>
  <rect x="224" y="200" width="56" height="48" rx="6" fill="#e89f41" opacity="0.8"/>
  <rect x="296" y="200" width="56" height="48" rx="6" fill="#e89f41"/>
  <rect x="368" y="200" width="56" height="48" rx="6" fill="#222"/>

  <!-- Row 4 -->
  <rect x="80"  y="264" width="56" height="48" rx="6" fill="#222"/>
  <rect x="152" y="264" width="56" height="48" rx="6" fill="#e89f41" opacity="0.5"/>
  <rect x="224" y="264" width="56" height="48" rx="6" fill="#222"/>
  <rect x="296" y="264" width="56" height="48" rx="6" fill="#222"/>
  <rect x="368" y="264" width="56" height="48" rx="6" fill="#e89f41" opacity="0.9"/>

  <!-- Row 5 -->
  <rect x="80"  y="328" width="56" height="48" rx="6" fill="#e89f41" opacity="0.8"/>
  <rect x="152" y="328" width="56" height="48" rx="6" fill="#222"/>
  <rect x="224" y="328" width="56" height="48" rx="6" fill="#e89f41" opacity="0.6"/>
  <rect x="296" y="328" width="56" height="48" rx="6" fill="#e89f41" opacity="0.3"/>
  <rect x="368" y="328" width="56" height="48" rx="6" fill="#222"/>

  <!-- Row 6 (bottom) -->
  <rect x="80"  y="392" width="56" height="48" rx="6" fill="#222"/>
  <rect x="152" y="392" width="56" height="48" rx="6" fill="#e89f41"/>
  <rect x="224" y="392" width="56" height="48" rx="6" fill="#222"/>
  <rect x="296" y="392" width="56" height="48" rx="6" fill="#e89f41" opacity="0.7"/>
  <rect x="368" y="392" width="56" height="48" rx="6" fill="#e89f41" opacity="0.5"/>
</svg>
